version: "3.8"

services:
  localstack:
    image: localstack/localstack:3.0   # 🔥 versão estável (evita bugs da latest)
    container_name: localstack
    environment:
      - SERVICES=sqs,sns
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - EDGE_PORT=4566
    ports:
      - "4566:4566"